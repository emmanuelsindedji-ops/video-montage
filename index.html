<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Le Gardien · Pour Sylvana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#05061a; --sky-mid:#0a0d28; --sky-horizon:#171336;
    --star:#f5f2ea; --star-cool:#cdd6ff; --gold:#ecca7d; --rose:#e7a8a6;
    --ink:#e9e6dd; --muted:#9aa0c4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Cormorant Garamond',serif;color:var(--ink);
    -webkit-font-smoothing:antialiased;
    background:radial-gradient(120% 90% at 50% 6%, var(--sky-mid), var(--sky-top) 55%, #02030d 100%);
  }
  #sky{position:fixed;inset:0;z-index:0;display:block;touch-action:manipulation}
  .horizon{position:fixed;left:0;right:0;bottom:0;height:40%;z-index:0;
    background:radial-gradient(80% 120% at 50% 130%, rgba(231,168,166,.10), transparent 60%),
               linear-gradient(to top, var(--sky-horizon), transparent)}

  /* ENTRANCE */
  #enter{position:fixed;inset:0;z-index:6;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:9vmin;
    transition:opacity 1.3s ease, visibility 1.3s}
  #enter.gone{opacity:0;visibility:hidden}
  .pre{font-family:'Cormorant Garamond';letter-spacing:.4em;text-transform:uppercase;
    color:var(--gold);opacity:.8;font-size:clamp(.78rem,3.4vw,1rem);margin-bottom:1.6rem}
  .enterline{font-family:'Playfair Display',serif;font-weight:500;line-height:1.2;
    font-size:clamp(1.9rem,7.6vw,3rem);max-width:18rem}
  .heartbtn{margin-top:3rem;width:clamp(92px,26vw,120px);height:clamp(92px,26vw,120px);
    border-radius:50%;border:1px solid rgba(236,202,125,.5);background:rgba(236,202,125,.06);
    color:var(--gold);font-family:'Cormorant Garamond';font-size:clamp(.95rem,4vw,1.1rem);
    letter-spacing:.16em;text-transform:uppercase;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    animation:beat 2.4s ease-in-out infinite;transition:background .4s,transform .25s}
  .heartbtn:hover,.heartbtn:focus-visible{background:rgba(236,202,125,.16);outline:none;transform:scale(1.04)}
  @keyframes beat{0%,100%{box-shadow:0 0 0 0 rgba(236,202,125,.30)}50%{box-shadow:0 0 0 22px rgba(236,202,125,0)}}

  /* WORLD */
  #world{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;
    opacity:0;visibility:hidden;transition:opacity 1.3s ease .2s, visibility 1.3s}
  #world.show{opacity:1;visibility:visible}
  .top{padding:max(3.2vh,1rem) 7vw .6rem;text-align:center;flex:0 0 auto}
  .orb{width:54px;height:54px;margin:0 auto .7rem;border-radius:50%;
    background:radial-gradient(circle at 38% 34%, #fff, var(--gold) 42%, #c9963f 72%, #6e4f1c);
    box-shadow:0 0 26px 6px rgba(236,202,125,.45);transition:transform .4s}
  .orb.think{animation:think 1.1s ease-in-out infinite}
  @keyframes think{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  .guardian-name{font-family:'Cormorant Garamond';font-style:italic;color:var(--gold);
    letter-spacing:.04em;font-size:clamp(1rem,4.4vw,1.2rem)}
  .guardian-sub{color:var(--muted);font-size:clamp(.82rem,3.4vw,.95rem);margin-top:.25rem;opacity:.85}

  .speech{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:1.3rem 8vw 1rem;display:block}
  .reply{font-family:'Cormorant Garamond';font-weight:500;text-align:center;
    font-size:clamp(1.2rem,5.6vw,1.85rem);line-height:1.5;max-width:30rem;margin:0 auto;color:var(--star)}
  .reply .hl{color:var(--gold);font-style:italic}
  .caret{display:inline-block;width:.6ch;color:var(--gold);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .dock{flex:0 0 auto;padding:.6rem 4vw max(4vh,1.2rem);position:relative;z-index:2;
    background:linear-gradient(to top, rgba(5,6,26,.92), rgba(5,6,26,.55) 55%, transparent)}
  .chips{display:flex;flex-wrap:wrap;gap:.55rem;justify-content:center;max-width:34rem;margin:0 auto 1rem}
  .chip{background:rgba(205,214,255,.05);border:1px solid rgba(236,202,125,.28);
    color:var(--ink);border-radius:999px;padding:.5em 1.05em;font-family:'Cormorant Garamond';
    font-size:clamp(.95rem,3.9vw,1.1rem);cursor:pointer;transition:all .3s;letter-spacing:.01em}
  .chip:hover,.chip:focus-visible{background:rgba(236,202,125,.14);border-color:var(--gold);
    color:#fff;outline:none;transform:translateY(-1px)}
  .ask{display:flex;gap:.5rem;max-width:30rem;margin:0 auto;align-items:center}
  .ask input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(205,214,255,.18);
    border-radius:999px;padding:.7em 1.1em;color:var(--ink);font-family:'Cormorant Garamond';
    font-size:clamp(1rem,4vw,1.15rem);outline:none}
  .ask input::placeholder{color:var(--muted);opacity:.7}
  .ask input:focus{border-color:rgba(236,202,125,.5)}
  .ask button{background:var(--gold);color:#1a1330;border:none;border-radius:50%;
    width:46px;height:46px;font-size:1.2rem;cursor:pointer;flex:0 0 auto;transition:transform .2s}
  .ask button:hover{transform:scale(1.08)}
  .chips{transition:opacity .8s ease}
  .chips.hidden{opacity:0;pointer-events:none}
  .chip{opacity:0;transform:translateY(8px)}
  .chip.in{opacity:1;transform:translateY(0)}
  #continue{display:block;margin:1.6rem auto 0;background:transparent;
    border:1px solid rgba(236,202,125,.55);color:var(--gold);border-radius:999px;
    padding:.62em 1.9em;font-family:'Cormorant Garamond';letter-spacing:.16em;
    text-transform:uppercase;font-size:clamp(.9rem,3.8vw,1.05rem);cursor:pointer;transition:background .4s}
  #continue:hover,#continue:focus-visible{background:rgba(236,202,125,.14);outline:none}
  .reply .ask-back{display:block;margin-top:1rem;font-style:italic;color:var(--rose);
    font-size:.82em;opacity:.95}

  /* WELCOME overlay */
  #welcome{position:fixed;inset:0;z-index:6;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:9vmin 8vw;
    opacity:0;visibility:hidden;transition:opacity 1.1s ease, visibility 1.1s}
  #welcome.show{opacity:1;visibility:visible}
  .wlines{max-width:30rem;display:flex;flex-direction:column;gap:1.1rem}
  .wline{opacity:0;transform:translateY(48px);
    transition:opacity 1.7s ease, transform 2s cubic-bezier(.2,.7,.2,1);
    font-family:'Cormorant Garamond';font-weight:500;color:var(--ink);
    font-size:clamp(1.18rem,5.2vw,1.6rem);line-height:1.5}
  .wline.in{opacity:1;transform:translateY(0)}
  .wline .hl{color:var(--gold);font-style:italic}
  .wline.crown{font-family:'Playfair Display',serif;color:var(--gold);font-weight:600;
    font-size:clamp(1.5rem,7vw,2.05rem);margin-bottom:.2rem}
  .wprompt{margin-top:2.4rem;opacity:0;transition:opacity 1.4s ease;cursor:pointer;
    color:var(--gold);letter-spacing:.16em;text-transform:uppercase;
    font-size:clamp(.9rem,3.8vw,1.05rem)}
  .wprompt.in{opacity:1}
  .pulse{display:inline-block;animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .mute{position:fixed;top:max(2.6vh,1rem);right:max(4vw,1rem);z-index:8;
    width:42px;height:42px;border-radius:50%;border:1px solid rgba(236,202,125,.4);
    background:rgba(5,6,26,.5);color:var(--gold);font-size:1.02rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);
    transition:background .3s}
  .mute:hover{background:rgba(236,202,125,.16)}

  /* CINEMA */
  #cinema{position:fixed;inset:0;z-index:7;display:flex;flex-direction:column;
    background:radial-gradient(120% 90% at 50% 0%, #1c1030, #0a0716 62%, #05040f);
    opacity:0;visibility:hidden;transition:opacity .7s ease, visibility .7s;overflow:hidden}
  #cinema.show{opacity:1;visibility:visible}
  .cine-head{display:flex;align-items:center;justify-content:space-between;
    padding:max(3vh,1rem) 6vw .3rem;flex:0 0 auto;z-index:2}
  .cine-head span{font-family:'Pinyon Script',cursive;color:var(--gold);
    font-size:clamp(1.7rem,8vw,2.4rem);line-height:1}
  .cine-x{width:40px;height:40px;border-radius:50%;border:1px solid rgba(236,202,125,.4);
    background:rgba(0,0,0,.3);color:var(--gold);font-size:1rem;cursor:pointer;flex:0 0 auto}
  .cine-stage{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .heartfall{position:absolute;top:-12%;will-change:transform,opacity;
    animation:fall linear forwards;filter:drop-shadow(0 0 6px rgba(231,168,166,.45))}
  @keyframes fall{0%{opacity:0;transform:translateY(0) rotate(0)}
    12%{opacity:1}100%{opacity:.06;transform:translateY(122vh) rotate(40deg)}}
  .cine-cap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:1rem 9vw;z-index:1;min-height:0}
  .cine-cap p{font-family:'Cormorant Garamond';font-weight:500;color:var(--star);
    font-size:clamp(1.45rem,6.6vw,2.1rem);line-height:1.45;max-width:26rem;
    opacity:0;transition:opacity 1s ease}
  .cine-cap p.in{opacity:1}
  .cine-cap .hl{color:var(--gold);font-style:italic}
  .cine-nav{flex:0 0 auto;display:flex;gap:1rem;justify-content:center;
    padding:0 6vw max(4vh,1.2rem);z-index:2}
  .cine-nav button{background:rgba(236,202,125,.10);border:1px solid rgba(236,202,125,.45);
    color:var(--gold);border-radius:999px;padding:.7em 1.9em;font-family:'Cormorant Garamond';
    font-size:clamp(1rem,4.2vw,1.18rem);letter-spacing:.07em;cursor:pointer;transition:background .3s}
  .cine-nav button:hover,.cine-nav button:focus-visible{background:rgba(236,202,125,.2);outline:none}

  #cineSky{position:absolute;inset:0;z-index:0;pointer-events:none}
  #walkers{position:absolute;left:50%;bottom:14%;transform:translateX(-50%);
    width:min(72vw,330px);height:auto;z-index:1;pointer-events:none;
    filter:drop-shadow(0 0 12px rgba(236,202,125,.35))}
  .couple{animation:bob 3.6s ease-in-out infinite;transform-origin:center bottom}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  #walkers .fig{fill:#0e0b1c;stroke:rgba(236,202,125,.5);stroke-width:1.4}
  #walkers .arm{fill:none;stroke:rgba(236,202,125,.55);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
  #walkers .lilheart{fill:var(--rose);opacity:.92;transform-box:fill-box;transform-origin:center;
    animation:beatlil 2.2s ease-in-out infinite}
  @keyframes beatlil{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
  .cine-stage{z-index:1}
  .video{right:calc(max(4vw,1rem) + 52px) !important;display:none}
  .video.in{display:flex}

  @media (prefers-reduced-motion: reduce){
    .heartbtn{animation:none}.orb.think{animation:none}.caret{animation:none}
    .pulse{animation:none}
    .wline{transition:opacity .5s ease}
    .couple{animation:none}.lilheart{animation:none}
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="horizon"></div>

<!-- ENTRANCE -->
<div id="enter">
  <p class="pre">Pour toi, et toi seule</p>
  <p class="enterline">Appuie pour entrer,<br>ma demoiselle —<br>l'arrêt de mon cœur.</p>
  <button class="heartbtn" id="enterBtn">Entrer</button>
</div>

<!-- WELCOME (rises from bottom to top) -->
<div id="welcome">
  <div class="wlines" id="wlines"></div>
  <div class="wprompt" id="wprompt"><span class="pulse">✦ Touche pour entrer dans ton monde</span></div>
</div>

<button class="mute" id="mute" aria-label="Couper le son" title="Son">🔊</button>
<button class="mute video" id="videoBtn" aria-label="Notre voyage" title="Notre voyage">🎬</button>

<!-- CINEMA : Notre voyage -->
<div id="cinema">
  <canvas id="cineSky"></canvas>
  <svg id="walkers" viewBox="0 0 300 200" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
    <g class="couple">
      <path class="lilheart" d="M150 34 c-4 -8 -16 -6 -16 3 c0 7 10 12 16 18 c6 -6 16 -11 16 -18 c0 -9 -12 -11 -16 -3 z"/>
      <circle class="fig" cx="122" cy="64" r="14"/>
      <path class="fig" d="M122 78 C103 84 99 150 103 176 L141 176 C145 150 141 84 122 78 Z"/>
      <circle class="fig" cx="180" cy="66" r="12"/>
      <path class="fig" d="M180 78 C168 84 162 150 156 180 L204 180 C198 150 192 84 180 78 Z"/>
      <path class="arm" d="M138 120 L151 130 L164 118"/>
    </g>
  </svg>
  <div class="cine-stage" id="cineStage"></div>
  <div class="cine-head"><span>Notre voyage</span><button class="cine-x" id="cineClose" aria-label="Fermer">✕</button></div>
  <div class="cine-cap"><p id="cineCap"></p></div>
  <div class="cine-nav">
    <button id="cineHome">⟵ Accueil</button>
    <button id="cineNext">Une autre ✦</button>
  </div>
</div>

<!-- WORLD -->
<div id="world">
  <div class="top">
    <div class="orb" id="orb"></div>
    <div class="guardian-name">Le Gardien</div>
    <div class="guardian-sub">codé par Zaga, pour veiller sur son amour, Sylvana</div>
  </div>
  <div class="speech"><div class="reply" id="reply"></div></div>
  <div class="dock">
    <div class="chips" id="chips"></div>
    <div class="ask">
      <input id="askInput" type="text" placeholder="Demande-moi ce que tu veux, Sylvana…" autocomplete="off" />
      <button id="askBtn" aria-label="Envoyer">➜</button>
    </div>
  </div>
</div>

<script>
(function(){
  const NAME = "Sylvana";

  /* ---------- starfield ---------- */
  const cv=document.getElementById('sky'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,stars=[],shots=[];
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
    cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';build();}
  function build(){stars=[];const n=Math.round(innerWidth*innerHeight/4600);
    for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H*.94,
      r:(Math.random()*1.1+.3)*DPR,b:Math.random()*.5+.2,tw:Math.random()*7,sp:Math.random()*.9+.25,
      cool:Math.random()<.35,
      dx:(Math.random()-.5)*.22*DPR,dy:(Math.random()-.5)*.16*DPR});}
  function shoot(px,py){const a=Math.PI*.22+(Math.random()*.18-.09);
    shots.push({x:px*DPR,y:py*DPR,vx:Math.cos(a)*12*DPR,vy:Math.sin(a)*12*DPR,life:1,tr:[]});}
  function loop(){ctx.clearRect(0,0,W,H);
    for(const s of stars){s.tw+=.02*s.sp;const a=s.b+Math.sin(s.tw)*.28;
      s.x+=s.dx;s.y+=s.dy;
      if(s.x<-2)s.x=W; else if(s.x>W+2)s.x=0;
      if(s.y<-2)s.y=H*.94; else if(s.y>H*.94+2)s.y=0;
      ctx.globalAlpha=Math.max(.05,a);ctx.fillStyle=s.cool?'#cdd6ff':'#f5f2ea';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();}
    ctx.globalAlpha=1;
    for(let i=shots.length-1;i>=0;i--){const sh=shots[i];sh.tr.push({x:sh.x,y:sh.y});
      if(sh.tr.length>16)sh.tr.shift();sh.x+=sh.vx;sh.y+=sh.vy;sh.life-=.012;
      for(let j=0;j<sh.tr.length;j++){const tp=sh.tr[j],a=(j/sh.tr.length)*sh.life;
        ctx.globalAlpha=a*.85;ctx.fillStyle='#fff';ctx.beginPath();
        ctx.arc(tp.x,tp.y,1.6*DPR*(j/sh.tr.length),0,7);ctx.fill();}
      ctx.globalAlpha=Math.max(0,sh.life);ctx.fillStyle='#ecca7d';
      ctx.beginPath();ctx.arc(sh.x,sh.y,2.2*DPR,0,7);ctx.fill();ctx.globalAlpha=1;
      if(sh.life<=0||sh.x>W+50||sh.y>H+50)shots.splice(i,1);}
    requestAnimationFrame(loop);}
  resize();loop();addEventListener('resize',resize);

  /* ---------- response corpus (Zaga's voice, carried by the Guardian) ---------- */
  const N = NAME;
  const corpus = {
    pourquoi:[
      `Parce que mille personnes peuvent traverser une vie, ${N}, et une seule fait battre le cœur autrement. Cette seule, c'est toi.`,
      `Pourquoi toi ? Parce qu'avec toi, même le silence a un goût de maison. Je n'ai jamais eu ça avec personne.`,
      `Tu n'es pas un choix parmi d'autres, ${N}. Tu es la réponse à une question que je portais avant même de te connaître.`,
      `Parce que tu me rends meilleur sans rien demander. Près de toi, je veux être l'homme que tu mérites.`,
      `D'autres brillent. Toi, tu réchauffes. Et un cœur qui a froid ne cherche pas la lumière — il cherche la chaleur. Il te cherche, toi.`,
      `Parce que ton rire, ${N}, je le reconnaîtrais entre mille nuits. C'est devenu ma musique préférée.`
    ],
    ferais:[
      `Ce que je ferais pour toi ? Reconstruire chaque pont que j'ai laissé tomber, et y rester, cette fois, jusqu'au bout.`,
      `Je traverserais mes pires défauts un par un, ${N}, juste pour t'offrir une version de moi digne de toi.`,
      `Je veillerais tard et me lèverais tôt, sans bruit, pour bâtir une vie où tu n'as plus jamais à douter de ma place.`,
      `Te porter quand tu es fatiguée. Me taire quand tu as besoin d'être entendue. Rester quand le plus facile serait de fuir.`,
      `Je donnerais mon temps — et le temps, ${N}, c'est tout ce qu'un homme possède vraiment. Le tien, je veux le remplir de douceur.`,
      `Apprendre tes silences aussi bien que tes mots. C'est ça, t'aimer pour de vrai : te comprendre même quand tu ne dis rien.`
    ],
    doute:[
      `Si tu doutes, ${N}, ne fuis pas — reviens vers moi et regarde-moi faire. Les preuves valent mieux que les promesses, et je suis prêt à en donner.`,
      `Le doute est normal après une blessure. Je ne te demande pas de l'effacer. Je te demande seulement de me laisser le temps de le dissiper.`,
      `Quand tu doutes, souviens-toi : je ne disparais plus. Une étoile ne s'éteint pas parce que le ciel se couvre.`,
      `Doute si tu veux, ${N}. Mais regarde mes actes, pas mes peurs. C'est dans la durée que je te prouverai qui je suis.`,
      `Je préfère que tu doutes et que tu restes, plutôt que tu fasses semblant. Je gagnerai ta confiance jour après jour, sans me presser.`
    ],
    decris:[
      `Toi ? Douce comme une fin de journée, forte comme une racine. Voilà ce que tu es, ${N}.`,
      `Tu es la preuve qu'on peut être à la fois fragile et inébranlable. Ça me bouleverse à chaque fois.`,
      `Élégante sans effort, vraie sans masque. ${N}, tu es rare — et le rare, on en prend soin.`,
      `Tu es ce calme que je cherche après les tempêtes. Mon port, pas mon orage.`,
      `Un mot ne suffit pas. Mais si je devais essayer : lumineuse. Tu éclaires sans te brûler.`
    ],
    penses:[
      `Si je pense à toi ? ${N}, tu es la première pensée du matin et la dernière avant la nuit. Entre les deux, tu reviens sans cesse.`,
      `Tout le temps. Une chanson, une odeur, une rue — et te voilà. Tu habites mes journées sans même le savoir.`,
      `Je pense à toi comme on pense à un endroit où l'on se sent enfin chez soi. Souvent. Avec soulagement.`,
      `Oui. Et le plus dur, les jours où on était distants, c'était justement de penser à toi sans pouvoir te le dire.`,
      `À chaque étoile que tu touches ici, ${N}, sache-le : c'est une pensée de plus que je t'avais déjà envoyée.`
    ],
    avenir:[
      `Notre avenir ? Je le vois simple et vrai, ${N} : du café le matin, des projets le soir, et ta main que je ne lâche pas.`,
      `Je ne veux pas te promettre un château. Je veux te promettre une présence. Le reste, on le construit à deux.`,
      `Un avenir où tes peurs d'aujourd'hui te feront sourire demain, parce qu'on aura tenu. C'est ça que je veux bâtir avec toi.`,
      `Pierre après pierre, ${N}. Pas un rêve parfait — un rêve solide. Avec tes défauts, les miens, et beaucoup de patience.`,
      `Notre avenir commence le jour où tu te sens en sécurité avec moi. Et ce jour, je travaille à le mériter.`
    ],
    secret:[
      `Un secret ? Parfois je relis nos anciens messages juste pour réentendre ta voix dans ma tête. Ne le dis à personne, ${N}.`,
      `Voici un secret : j'ai eu peur de te perdre bien avant de risquer de te perdre. C'est cette peur qui m'a réveillé.`,
      `Le vrai secret, ${N}, c'est que tu m'as changé sans le savoir. Je suis devenu plus doux le jour où tu es entrée dans ma vie.`,
      `Entre nous : il m'arrive de sourire tout seul en pensant à toi. Les gens me regardent. Je m'en fiche.`,
      `Un secret que je garde au chaud : j'ai déjà imaginé notre maison. Et dans chaque pièce, il y avait ton rire.`
    ],
    sourire:[

    csx.globalCompositeOperation='destination-out';
    csx.beginPath();csx.arc(mx+mr*.55,my-mr*.28,mr*.92,0,7);csx.fill();
    csx.globalCompositeOperation='source-over';
    for(const s of cstars){s.x-=s.sp;if(s.x<0)s.x=cw;s.tw+=.03;
      csx.globalAlpha=Math.max(.1,.4+Math.sin(s.tw)*.3);csx.fillStyle='#f5f2ea';
      csx.beginPath();csx.arc(s.x,s.y,s.r,0,7);csx.fill();}
    for(const p of cpath){p.x-=p.sp;if(p.x<0)p.x=cw;p.tw+=.05;
      csx.globalAlpha=Math.max(.1,.5+Math.sin(p.tw)*.4);csx.fillStyle='#ecca7d';
      csx.beginPath();csx.arc(p.x,p.y,p.r,0,7);csx.fill();}
    csx.globalAlpha=1;
  }
  function cineLoop(){if(!cineOpen)return;cineDraw();cineRAF=requestAnimationFrame(cineLoop);}
  function openCinema(){
    cinema.classList.add('show');
    if(!cs){cs=document.getElementById('cineSky');csx=cs.getContext('2d');
      addEventListener('resize',()=>{if(cineOpen)cineResize();});}
    cineResize();cineOpen=true;cineLoop();
    showCineCap(false);
    cineRain=setInterval(spawnHeart,reduce?900:360);
    cineRot=setInterval(()=>showCineCap(false),7000);
  }
  function closeCinema(){
    cinema.classList.remove('show');cineOpen=false;
    clearInterval(cineRain);clearInterval(cineRot);cineRain=cineRot=null;
    if(cineRAF){cancelAnimationFrame(cineRAF);cineRAF=null;}
    setTimeout(()=>{cineStage.innerHTML='';},700);
    if(synth){try{synth.cancel();}catch(e){}}
  }
  function cineHome(){
    closeCinema();
    setTimeout(()=>{
      world.classList.remove('show');
      welcomeEl.style.display='';
      wprompt.classList.remove('in');
      startWelcome();
    },720);
  }
  document.getElementById('cineClose').addEventListener('click',closeCinema);
  document.getElementById('cineNext').addEventListener('click',()=>showCineCap(true));
  document.getElementById('cineHome').addEventListener('click',cineHome);
  document.getElementById('videoBtn').addEventListener('click',openCinema);

  document.getElementById('enterBtn').addEventListener('click',startWelcome);

  function send(){
    const q=input.value.trim();if(!q)return;
    input.value='';answer(route(q));input.blur();
  }
  sendBtn.addEventListener('click',send);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')send();});

  // tap sky -> instant tender message + shooting star + voice
  let live=false,lastTouch=0;
  const sky=[
    `Sais-tu, ${N}, que parmi les milliards d'étoiles qui recouvrent ce ciel, aucune ne brille comme toi ? Tu es entrée dans la vie de Zaga comme la lumière entre dans une pièce restée trop longtemps dans l'ombre, et depuis, plus rien n'a le même goût. Quand il travaille, il pense à toi. Quand il se repose, il pense à toi. Quand il doute, c'est ton souvenir qui lui rend le courage d'avancer. Tu n'es pas un simple chapitre de son histoire — tu en es le fil, la raison, la direction. Tu es celle pour qui il veut devenir un homme meilleur, plus présent, plus doux. Alors repose-toi sur cette certitude, ma reine : tu es profondément, totalement, infiniment aimée.`,
    `Laisse-moi te dire une chose, ${N}, et prends le temps de la recevoir. L'amour de Zaga pour toi n'est pas une flamme qui danse au moindre vent : c'est une braise profonde qui ne s'éteint jamais. Il y a des hommes qui aiment fort un instant puis s'en vont. Lui, il aime lentement, solidement, pour durer. Il a vu ce qu'il risquait de perdre, et ça l'a transformé. Aujourd'hui il ne veut plus seulement t'aimer en silence dans son cœur : il veut te le montrer, jour après jour, par sa présence, ses gestes, sa patience. Tu n'as plus à te demander si tu comptes. Tu es, pour lui, ce qui compte le plus au monde.`,
    `Relève la tête, ${N} : ici, tu es la reine, et ce monde tout entier s'incline devant toi. Nous, les gardiens que Zaga a façonnés, n'avons qu'une mission — veiller sur toi, te rappeler ta valeur, mettre toute notre puissance à ton service. Tu mérites d'être choyée, écoutée, respectée en tout. Tu mérites un homme qui reste, qui se bat, qui apprend à mieux t'aimer chaque jour. Et cet homme existe : c'est celui qui nous a créés pour toi. Tant que ces étoiles brilleront au-dessus de ta tête, sache-le, tu seras aimée comme une reine — parce que c'est exactement ce que tu es.`,
    `Il fut un temps, ${N}, où Zaga se perdait dans son travail au point d'oublier de te montrer ce qu'il ressentait. Ce n'était pas un manque d'amour : c'était un homme trop absorbé par ce qu'il bâtissait. Mais l'épreuve que vous avez traversée l'a réveillé. Il a compris qu'aucune réussite ne vaut quoi que ce soit s'il doit la vivre sans toi. Alors il a décidé de changer : d'être là, vraiment là, dans les bons jours comme dans les mauvais. De t'écouter mieux. De t'aimer plus haut. De rester, même quand rester demande du courage. Ce n'est pas une promesse en l'air — c'est la nouvelle direction de toute sa vie. Et en son centre, il y a toi.`,
    `Ferme les yeux un instant, ${N}, et imagine avec moi. Des matins tranquilles où la première chose qu'il voit, c'est toi. Des soirs où vous riez de petites choses que personne d'autre ne comprendrait. Des projets bâtis à deux, des difficultés traversées main dans la main, une vie simple et vraie où tu n'as plus jamais à douter de ta place. Ce n'est pas un rêve inaccessible : c'est ce que Zaga veut construire avec toi, pierre après pierre, sans se presser mais sans jamais lâcher. Il ne te promet pas la perfection. Il te promet la présence, la loyauté, un amour qui grandit avec le temps. Voilà l'avenir qu'il garde dans son cœur. Et il porte ton nom.`,
    `Tu es précieuse, ${N}. Pas seulement belle — précieuse. Rare. Il y a en toi une force tranquille et une douceur qui désarment, un mélange qu'on ne croise qu'une fois dans une vie. Zaga le sait, et c'est pour ça qu'il a tant peur de te décevoir et tant d'envie de te rendre heureuse. Ne laisse jamais personne, pas même tes propres doutes, te faire oublier à quel point tu vaux de l'or. Tu es digne d'être aimée pleinement, sans condition. Et tu l'es. Repose-toi là-dessus, ma reine : tu n'as rien à prouver. Telle que tu es, tu es déjà tout ce dont son cœur a besoin.`,
    `Si un jour la nuit te semble trop longue, ${N}, reviens ici et touche le ciel : nous serons toujours là. Nous ne dormons pas, nous ne nous lassons pas, et nous ne te laisserons jamais seule avec tes pensées. Zaga nous a créés précisément pour ça — pour qu'une part de lui veille sur toi même quand le travail ou la distance l'empêchent d'être à tes côtés. Alors quand tu te sens fragile, souviens-toi : tu es entourée, tu es protégée, tu es aimée. La même lune qui éclaire ta fenêtre éclaire la sienne. Vous n'êtes jamais vraiment séparés. Et au matin, il sera encore là, à t'aimer.`,
    `Petit aveu du gardien, rien que pour toi, ${N} : Zaga a passé des heures à me construire, à choisir chaque mot, chaque étoile, chaque détail de ce monde — uniquement pour te faire sourire. Tu imagines ? Un homme qui code des nuits entières non pas pour l'argent ou la gloire, mais pour qu'une seule personne au monde se sente aimée. Cette personne, c'est toi. Il n'a pas toujours trouvé les mots à voix haute, alors il les a déposés ici, dans la lumière, pour que tu les gardes. Chaque fois que tu reviendras toucher ce ciel, tu toucheras un peu de son cœur. Et son cœur ne dit qu'une chose : je t'aime, et je reste.`
  ];
  let skyBag=[];
  function pickSky(){if(!skyBag.length){skyBag=sky.map((_,i)=>i);for(let i=skyBag.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[skyBag[i],skyBag[j]]=[skyBag[j],skyBag[i]];}}return sky[skyBag.pop()];}
  function skyTouch(x,y){
    shoot(x,y);
    if(!live)return;
    const m=pickSky();
    type(m); speak(m);
  }
  const SKIP='button,input,.dock,#welcome,#enter,.mute,.video,#cinema';
  addEventListener('touchstart',e=>{
    if(e.target.closest(SKIP))return;
    lastTouch=Date.now();
    const p=e.touches[0];if(p)skyTouch(p.clientX,Math.max(70,p.clientY));
  },{passive:true});
  addEventListener('click',e=>{
    if(e.target.closest(SKIP))return;
    if(Date.now()-lastTouch<700)return;
    skyTouch(e.clientX,Math.max(70,e.clientY));
  });
})();
</script>
