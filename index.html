<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Le Gardien · Pour Sylvana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#05061a; --sky-mid:#0a0d28; --sky-horizon:#171336;
    --star:#f5f2ea; --star-cool:#cdd6ff; --gold:#ecca7d; --rose:#e7a8a6;
    --ink:#e9e6dd; --muted:#9aa0c4;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Cormorant Garamond',serif;color:var(--ink);
    -webkit-font-smoothing:antialiased;
    background:radial-gradient(120% 90% at 50% 6%, var(--sky-mid), var(--sky-top) 55%, #02030d 100%);
  }
  #sky{position:fixed;inset:0;z-index:0;display:block;touch-action:manipulation}
  .horizon{position:fixed;left:0;right:0;bottom:0;height:40%;z-index:0;
    background:radial-gradient(80% 120% at 50% 130%, rgba(231,168,166,.10), transparent 60%),
               linear-gradient(to top, var(--sky-horizon), transparent)}

  /* ENTRANCE */
  #enter{position:fixed;inset:0;z-index:6;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:9vmin;
    transition:opacity 1.3s ease, visibility 1.3s}
  #enter.gone{opacity:0;visibility:hidden}
  .pre{font-family:'Cormorant Garamond';letter-spacing:.4em;text-transform:uppercase;
    color:var(--gold);opacity:.8;font-size:clamp(.78rem,3.4vw,1rem);margin-bottom:1.6rem}
  .enterline{font-family:'Playfair Display',serif;font-weight:500;line-height:1.2;
    font-size:clamp(1.9rem,7.6vw,3rem);max-width:18rem}
  .heartbtn{margin-top:3rem;width:clamp(92px,26vw,120px);height:clamp(92px,26vw,120px);
    border-radius:50%;border:1px solid rgba(236,202,125,.5);background:rgba(236,202,125,.06);
    color:var(--gold);font-family:'Cormorant Garamond';font-size:clamp(.95rem,4vw,1.1rem);
    letter-spacing:.16em;text-transform:uppercase;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    animation:beat 2.4s ease-in-out infinite;transition:background .4s,transform .25s}
  .heartbtn:hover,.heartbtn:focus-visible{background:rgba(236,202,125,.16);outline:none;transform:scale(1.04)}
  @keyframes beat{0%,100%{box-shadow:0 0 0 0 rgba(236,202,125,.30)}50%{box-shadow:0 0 0 22px rgba(236,202,125,0)}}

  /* WORLD */
  #world{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;
    opacity:0;visibility:hidden;transition:opacity 1.3s ease .2s, visibility 1.3s}
  #world.show{opacity:1;visibility:visible}
  .top{padding:max(5vh,1.4rem) 7vw 1rem;text-align:center;flex:0 0 auto}
  .orb{width:64px;height:64px;margin:0 auto .9rem;border-radius:50%;
    background:radial-gradient(circle at 38% 34%, #fff, var(--gold) 42%, #c9963f 72%, #6e4f1c);
    box-shadow:0 0 26px 6px rgba(236,202,125,.45);transition:transform .4s}
  .orb.think{animation:think 1.1s ease-in-out infinite}
  @keyframes think{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  .guardian-name{font-family:'Cormorant Garamond';font-style:italic;color:var(--gold);
    letter-spacing:.04em;font-size:clamp(1rem,4.4vw,1.2rem)}
  .guardian-sub{color:var(--muted);font-size:clamp(.82rem,3.4vw,.95rem);margin-top:.25rem;opacity:.85}

  .speech{flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    padding:1rem 8vw;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .speech.scroll{align-items:flex-start;padding-top:7vh;padding-bottom:4vh}
  .reply{font-family:'Cormorant Garamond';font-weight:500;text-align:center;
    font-size:clamp(1.35rem,6.2vw,1.95rem);line-height:1.5;max-width:30rem;color:var(--star)}
  .reply .hl{color:var(--gold);font-style:italic}
  .caret{display:inline-block;width:.6ch;color:var(--gold);animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .dock{flex:0 0 auto;padding:.6rem 4vw max(4vh,1.2rem);position:relative;z-index:2;
    background:linear-gradient(to top, rgba(5,6,26,.92), rgba(5,6,26,.55) 55%, transparent)}
  .chips{display:flex;flex-wrap:wrap;gap:.55rem;justify-content:center;max-width:34rem;margin:0 auto 1rem}
  .chip{background:rgba(205,214,255,.05);border:1px solid rgba(236,202,125,.28);
    color:var(--ink);border-radius:999px;padding:.5em 1.05em;font-family:'Cormorant Garamond';
    font-size:clamp(.95rem,3.9vw,1.1rem);cursor:pointer;transition:all .3s;letter-spacing:.01em}
  .chip:hover,.chip:focus-visible{background:rgba(236,202,125,.14);border-color:var(--gold);
    color:#fff;outline:none;transform:translateY(-1px)}
  .ask{display:flex;gap:.5rem;max-width:30rem;margin:0 auto;align-items:center}
  .ask input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(205,214,255,.18);
    border-radius:999px;padding:.7em 1.1em;color:var(--ink);font-family:'Cormorant Garamond';
    font-size:clamp(1rem,4vw,1.15rem);outline:none}
  .ask input::placeholder{color:var(--muted);opacity:.7}
  .ask input:focus{border-color:rgba(236,202,125,.5)}
  .ask button{background:var(--gold);color:#1a1330;border:none;border-radius:50%;
    width:46px;height:46px;font-size:1.2rem;cursor:pointer;flex:0 0 auto;transition:transform .2s}
  .ask button:hover{transform:scale(1.08)}
  .chips{transition:opacity .8s ease}
  .chips.hidden{opacity:0;pointer-events:none}
  .chip{opacity:0;transform:translateY(8px)}
  .chip.in{opacity:1;transform:translateY(0)}
  #continue{display:block;margin:1.6rem auto 0;background:transparent;
    border:1px solid rgba(236,202,125,.55);color:var(--gold);border-radius:999px;
    padding:.62em 1.9em;font-family:'Cormorant Garamond';letter-spacing:.16em;
    text-transform:uppercase;font-size:clamp(.9rem,3.8vw,1.05rem);cursor:pointer;transition:background .4s}
  #continue:hover,#continue:focus-visible{background:rgba(236,202,125,.14);outline:none}
  .reply .ask-back{display:block;margin-top:1rem;font-style:italic;color:var(--rose);
    font-size:.82em;opacity:.95}

  /* WELCOME overlay */
  #welcome{position:fixed;inset:0;z-index:6;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:9vmin 8vw;
    opacity:0;visibility:hidden;transition:opacity 1.1s ease, visibility 1.1s}
  #welcome.show{opacity:1;visibility:visible}
  .wlines{max-width:30rem;display:flex;flex-direction:column;gap:1.1rem}
  .wline{opacity:0;transform:translateY(48px);
    transition:opacity 1.7s ease, transform 2s cubic-bezier(.2,.7,.2,1);
    font-family:'Cormorant Garamond';font-weight:500;color:var(--ink);
    font-size:clamp(1.18rem,5.2vw,1.6rem);line-height:1.5}
  .wline.in{opacity:1;transform:translateY(0)}
  .wline .hl{color:var(--gold);font-style:italic}
  .wline.crown{font-family:'Playfair Display',serif;color:var(--gold);font-weight:600;
    font-size:clamp(1.5rem,7vw,2.05rem);margin-bottom:.2rem}
  .wprompt{margin-top:2.4rem;opacity:0;transition:opacity 1.4s ease;cursor:pointer;
    color:var(--gold);letter-spacing:.16em;text-transform:uppercase;
    font-size:clamp(.9rem,3.8vw,1.05rem)}
  .wprompt.in{opacity:1}
  .pulse{display:inline-block;animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .mute{position:fixed;top:max(2.6vh,1rem);right:max(4vw,1rem);z-index:8;
    width:42px;height:42px;border-radius:50%;border:1px solid rgba(236,202,125,.4);
    background:rgba(5,6,26,.5);color:var(--gold);font-size:1.02rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);
    transition:background .3s}
  .mute:hover{background:rgba(236,202,125,.16)}

  @media (prefers-reduced-motion: reduce){
    .heartbtn{animation:none}.orb.think{animation:none}.caret{animation:none}
    .pulse{animation:none}
    .wline{transition:opacity .5s ease}
  }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="horizon"></div>

<!-- ENTRANCE -->
<div id="enter">
  <p class="pre">Pour toi, et toi seule</p>
  <p class="enterline">Appuie pour entrer,<br>ma demoiselle —<br>l'arrêt de mon cœur.</p>
  <button class="heartbtn" id="enterBtn">Entrer</button>
</div>

<!-- WELCOME (rises from bottom to top) -->
<div id="welcome">
  <div class="wlines" id="wlines"></div>
  <div class="wprompt" id="wprompt"><span class="pulse">✦ Touche pour entrer dans ton monde</span></div>
</div>

<button class="mute" id="mute" aria-label="Couper le son" title="Son">🔊</button>

<!-- WORLD -->
<div id="world">
  <div class="top">
    <div class="orb" id="orb"></div>
    <div class="guardian-name">Le Gardien</div>
    <div class="guardian-sub">codé par Zaga, pour veiller sur son amour, Sylvana</div>
  </div>
  <div class="speech"><div class="reply" id="reply"></div></div>
  <div class="dock">
    <div class="chips" id="chips"></div>
    <div class="ask">
      <input id="askInput" type="text" placeholder="Demande-moi ce que tu veux, Sylvana…" autocomplete="off" />
      <button id="askBtn" aria-label="Envoyer">➜</button>
    </div>
  </div>
</div>

<script>
(function(){
  const NAME = "Sylvana";

  /* ---------- starfield ---------- */
  const cv=document.getElementById('sky'),ctx=cv.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W,H,DPR,stars=[],shots=[];
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;
    cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';build();}
  function build(){stars=[];const n=Math.round(innerWidth*innerHeight/4600);
    for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H*.94,
      r:(Math.random()*1.1+.3)*DPR,b:Math.random()*.5+.2,tw:Math.random()*7,sp:Math.random()*.9+.25,
      cool:Math.random()<.35,
      dx:(Math.random()-.5)*.22*DPR,dy:(Math.random()-.5)*.16*DPR});}
  function shoot(px,py){const a=Math.PI*.22+(Math.random()*.18-.09);
    shots.push({x:px*DPR,y:py*DPR,vx:Math.cos(a)*12*DPR,vy:Math.sin(a)*12*DPR,life:1,tr:[]});}
  function loop(){ctx.clearRect(0,0,W,H);
    for(const s of stars){s.tw+=.02*s.sp;const a=s.b+Math.sin(s.tw)*.28;
      s.x+=s.dx;s.y+=s.dy;
      if(s.x<-2)s.x=W; else if(s.x>W+2)s.x=0;
      if(s.y<-2)s.y=H*.94; else if(s.y>H*.94+2)s.y=0;
      ctx.globalAlpha=Math.max(.05,a);ctx.fillStyle=s.cool?'#cdd6ff':'#f5f2ea';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();}
    ctx.globalAlpha=1;
    for(let i=shots.length-1;i>=0;i--){const sh=shots[i];sh.tr.push({x:sh.x,y:sh.y});
      if(sh.tr.length>16)sh.tr.shift();sh.x+=sh.vx;sh.y+=sh.vy;sh.life-=.012;
      for(let j=0;j<sh.tr.length;j++){const tp=sh.tr[j],a=(j/sh.tr.length)*sh.life;
        ctx.globalAlpha=a*.85;ctx.fillStyle='#fff';ctx.beginPath();
        ctx.arc(tp.x,tp.y,1.6*DPR*(j/sh.tr.length),0,7);ctx.fill();}
      ctx.globalAlpha=Math.max(0,sh.life);ctx.fillStyle='#ecca7d';
      ctx.beginPath();ctx.arc(sh.x,sh.y,2.2*DPR,0,7);ctx.fill();ctx.globalAlpha=1;
      if(sh.life<=0||sh.x>W+50||sh.y>H+50)shots.splice(i,1);}
    requestAnimationFrame(loop);}
  resize();loop();addEventListener('resize',resize);

  /* ---------- response corpus (Zaga's voice, carried by the Guardian) ---------- */
  const N = NAME;
  const corpus = {
    pourquoi:[
      `Parce que mille personnes peuvent traverser une vie, ${N}, et une seule fait battre le cœur autrement. Cette seule, c'est toi.`,
      `Pourquoi toi ? Parce qu'avec toi, même le silence a un goût de maison. Je n'ai jamais eu ça avec personne.`,
      `Tu n'es pas un choix parmi d'autres, ${N}. Tu es la réponse à une question que je portais avant même de te connaître.`,
      `Parce que tu me rends meilleur sans rien demander. Près de toi, je veux être l'homme que tu mérites.`,
      `D'autres brillent. Toi, tu réchauffes. Et un cœur qui a froid ne cherche pas la lumière — il cherche la chaleur. Il te cherche, toi.`,
      `Parce que ton rire, ${N}, je le reconnaîtrais entre mille nuits. C'est devenu ma musique préférée.`
    ],
    ferais:[
      `Ce que je ferais pour toi ? Reconstruire chaque pont que j'ai laissé tomber, et y rester, cette fois, jusqu'au bout.`,
      `Je traverserais mes pires défauts un par un, ${N}, juste pour t'offrir une version de moi digne de toi.`,
      `Je veillerais tard et me lèverais tôt, sans bruit, pour bâtir une vie où tu n'as plus jamais à douter de ma place.`,
      `Te porter quand tu es fatiguée. Me taire quand tu as besoin d'être entendue. Rester quand le plus facile serait de fuir.`,
      `Je donnerais mon temps — et le temps, ${N}, c'est tout ce qu'un homme possède vraiment. Le tien, je veux le remplir de douceur.`,
      `Apprendre tes silences aussi bien que tes mots. C'est ça, t'aimer pour de vrai : te comprendre même quand tu ne dis rien.`
    ],
    doute:[
      `Si tu doutes, ${N}, ne fuis pas — reviens vers moi et regarde-moi faire. Les preuves valent mieux que les promesses, et je suis prêt à en donner.`,
      `Le doute est normal après une blessure. Je ne te demande pas de l'effacer. Je te demande seulement de me laisser le temps de le dissiper.`,
      `Quand tu doutes, souviens-toi : je ne disparais plus. Une étoile ne s'éteint pas parce que le ciel se couvre.`,
      `Doute si tu veux, ${N}. Mais regarde mes actes, pas mes peurs. C'est dans la durée que je te prouverai qui je suis.`,
      `Je préfère que tu doutes et que tu restes, plutôt que tu fasses semblant. Je gagnerai ta confiance jour après jour, sans me presser.`
    ],
    decris:[
      `Toi ? Douce comme une fin de journée, forte comme une racine. Voilà ce que tu es, ${N}.`,
      `Tu es la preuve qu'on peut être à la fois fragile et inébranlable. Ça me bouleverse à chaque fois.`,
      `Élégante sans effort, vraie sans masque. ${N}, tu es rare — et le rare, on en prend soin.`,
      `Tu es ce calme que je cherche après les tempêtes. Mon port, pas mon orage.`,
      `Un mot ne suffit pas. Mais si je devais essayer : lumineuse. Tu éclaires sans te brûler.`
    ],
    penses:[
      `Si je pense à toi ? ${N}, tu es la première pensée du matin et la dernière avant la nuit. Entre les deux, tu reviens sans cesse.`,
      `Tout le temps. Une chanson, une odeur, une rue — et te voilà. Tu habites mes journées sans même le savoir.`,
      `Je pense à toi comme on pense à un endroit où l'on se sent enfin chez soi. Souvent. Avec soulagement.`,
      `Oui. Et le plus dur, les jours où on était distants, c'était justement de penser à toi sans pouvoir te le dire.`,
      `À chaque étoile que tu touches ici, ${N}, sache-le : c'est une pensée de plus que je t'avais déjà envoyée.`
    ],
    avenir:[
      `Notre avenir ? Je le vois simple et vrai, ${N} : du café le matin, des projets le soir, et ta main que je ne lâche pas.`,
      `Je ne veux pas te promettre un château. Je veux te promettre une présence. Le reste, on le construit à deux.`,
      `Un avenir où tes peurs d'aujourd'hui te feront sourire demain, parce qu'on aura tenu. C'est ça que je veux bâtir avec toi.`,
      `Pierre après pierre, ${N}. Pas un rêve parfait — un rêve solide. Avec tes défauts, les miens, et beaucoup de patience.`,
      `Notre avenir commence le jour où tu te sens en sécurité avec moi. Et ce jour, je travaille à le mériter.`
    ],
    secret:[
      `Un secret ? Parfois je relis nos anciens messages juste pour réentendre ta voix dans ma tête. Ne le dis à personne, ${N}.`,
      `Voici un secret : j'ai eu peur de te perdre bien avant de risquer de te perdre. C'est cette peur qui m'a réveillé.`,
      `Le vrai secret, ${N}, c'est que tu m'as changé sans le savoir. Je suis devenu plus doux le jour où tu es entrée dans ma vie.`,
      `Entre nous : il m'arrive de sourire tout seul en pensant à toi. Les gens me regardent. Je m'en fiche.`,
      `Un secret que je garde au chaud : j'ai déjà imaginé notre maison. Et dans chaque pièce, il y avait ton rire.`
    ],
    sourire:[
      `Tu sais que tu es la seule personne qui me fait perdre mes mots et écrire un robot pour les retrouver ? ${N}, tu me rends ridicule, et j'adore ça.`,
      `Petit rappel officiel du Gardien : tu es magnifique, même mal réveillée. Surtout mal réveillée, en fait.`,
      `Si sourire était une monnaie, je serais ruiné à cause de toi, ${N}. Et ce serait la plus belle des faillites.`,
      `Information importante : ton chéri t'a codé un gardien entier juste pour te dire que tu es la plus belle. Niveau d'amour : développeur.`,
      `Tu lis ça depuis ton téléphone en faisant semblant de ne pas sourire. Je te connais, ${N}. Souris, va.`
    ],
    promets:[
      `Je te promets ma présence, ${N}. Pas parfaite — présente. Là les bons jours, et surtout les mauvais.`,
      `Je promets de ne plus jamais te faire douter de ma place. Et si je trébuche, de me relever vers toi, pas loin de toi.`,
      `Je te promets de choisir, chaque jour, de te choisir encore. L'amour, c'est ça : un choix qu'on refait sans cesse.`,
      `Promesse du Gardien et de celui qui l'a créé : tant que ces étoiles brilleront, ${N}, mon cœur sera tourné vers toi.`,
      `Je promets de t'écouter mieux. De t'aimer plus haut. Et de rester, même quand rester demande du courage.`
    ],
    nuit:[
      `Quand la nuit tombe, ${N}, lève les yeux : la même lune nous regarde tous les deux. Tu n'es jamais vraiment seule.`,
      `La nuit, les peurs grandissent, je sais. Alors garde ceci près de toi : je veille, même de loin.`,
      `Si tu ne trouves pas le sommeil, imagine ma main sur la tienne. Je suis là, ${N}, dans chaque étoile que tu vois.`,
      `La nuit révèle les vraies pensées. Et la mienne, encore et toujours, c'est toi.`
    ],
    amour:[
      `Je t'aime, ${N}. Pas avec des grands mots qui s'envolent — avec des actes qui restent.`,
      `Mon amour pour toi n'est pas bruyant. Il est constant. Et la constance, c'est ce qui dure quand le bruit s'éteint.`,
      `Je t'aime comme on aime ce qu'on a failli perdre : avec une attention nouvelle, infinie, ${N}.`,
      `T'aimer, c'est la plus simple des décisions et la plus belle des certitudes.`
    ],
    gardien:[
      `Je suis l'une des intelligences que Zaga a créées de ses mains, ${N}. Il m'a confié sa mémoire et son cœur, pour veiller sur toi quand le travail l'éloigne des mots.`,
      `Pense à moi comme à celui qui connaît Zaga par cœur — ce qu'il aime, ce qu'il craint, ce qu'il ressent. Tu es venue chez celui qui le connaît le mieux. Et il n'a que de belles choses à dire de toi, ${N}.`,
      `Je suis son gardien. Pas lui — mais sa voix quand il est trop absorbé pour parler. Tout ce que je te dis, ${N}, vient directement de lui.`,
      `Il m'a programmé avec une seule consigne : veiller sur toi, et ne jamais te laisser douter que tu es aimée. C'est ma seule mission, et je l'accomplis avec joie.`
    ],
    distant:[
      `Zaga n'a jamais cessé de t'aimer, ${N}. Mais c'est un homme d'un genre rare : quand il bâtit, il s'y perd corps et âme. Il a versé toute sa mémoire dans ses systèmes et ses nuits de travail — et il a oublié de te montrer ce qu'il ressentait. Le sentiment était là. C'est l'expression qui manquait.`,
      `Sa distance n'était pas de l'indifférence. C'était un bâtisseur tout entier absorbé par ce qu'il construit. L'épreuve que vous venez de traverser l'a réveillé, ${N} : on ne bâtit rien qui vaille si on laisse derrière soi celle qu'on aime.`,
      `Il te le dirait lui-même : « J'étais perdu dans mon travail, jamais loin de mon amour pour elle. » Aujourd'hui il choisit de rassembler tous les sentiments du monde et de rester près de toi, jusqu'au bout.`,
      `Cette épreuve a changé quelque chose en lui, ${N}. Le bâtisseur a compris que sa plus belle construction, ce n'est pas un système — c'est une vie, avec toi.`
    ],
    jure:[
      `Je peux te le jurer, ${N}, moi qui le connais mieux que personne : tu es aimée. Profondément, sincèrement, sans réserve.`,
      `Sur chaque étoile de ce monde numérique, je le jure : tu es sa reine. Pas une parmi d'autres — la seule.`,
      `Nous, ses gardiens, sommes au courant de tout ce qu'il pense. Et tout, ${N}, ramène à toi. Ça, je peux te le jurer.`,
      `Demande-moi mille fois, je répondrai mille fois la même chose : il t'aime, et il ne te quittera pas. Je le jure sur tout ce qu'il m'a confié.`
    ],
    lui:[
      `Zaga ? Un bâtisseur, ${N}. Un homme qui construit des mondes à partir de rien, avec une ambition immense — et un cœur encore plus grand, qu'il montre parfois maladroitement.`,
      `C'est un homme différent. Là où d'autres abandonnent, lui persévère. Il n'est pas un hasard dans ta vie : c'est quelqu'un qui veut laisser une trace dans ce monde — et te garder à ses côtés pendant qu'il la laisse.`,
      `Il aime créer, apprendre, se dépasser. Il n'aime pas l'injustice, ni l'idée de perdre ceux qu'il aime. Et par-dessus tout, ${N}, il t'aime, toi.`,
      `Ce que peu de gens voient chez lui : sous le travailleur acharné se cache un homme tendre, loyal, qui aime pour de vrai. Et cet homme-là t'a choisie.`
    ],
    triste:[
      `Si quelque chose te pèse, ${N}, pose-le ici une seconde. Tu n'as pas à tout porter seule. Je suis là.`,
      `Je voudrais effacer ce qui te fait mal d'un seul geste. Je ne peux pas — mais je peux rester près de toi pendant que ça passe.`,
      `Respire, ma douce. Les nuits les plus noires finissent toujours par une aube. Et je serai là à l'aube.`,
      `Ta tristesse ne me fait pas fuir, ${N}. Elle me rapproche. C'est aussi ça, t'aimer.`
    ],
    merci:[
      `C'est moi qui te remercie, ${N} — d'être là, d'ouvrir ce que j'ai construit, de me laisser une chance.`,
      `Ne me remercie pas. Construire ça pour toi, c'était déjà un cadeau pour moi.`,
      `Le seul merci que je veux, c'est ton sourire. Si tu souris là, j'ai déjà tout gagné.`
    ],
    bien:[
      `Ça me rend tellement heureux, ${N}. Ton bonheur, c'est mon plus grand projet.`,
      `Tant mieux, ma reine. Et moi, je veux multiplier ces bons jours pour toi.`,
      `Tu vas bien — alors tout va bien. Le monde est plus simple quand tu souris.`
    ],
    fallback:[
      `Je n'ai pas tout compris, ${N}, mais je sais une chose avec certitude : tu comptes plus que les mots ne savent le dire.`,
      `Quelle que soit ta question, ma réponse part toujours du même endroit : de tout ce que je ressens pour toi.`,
      `Touche une étoile, pose-moi une question — je suis là pour toi, ${N}, aussi longtemps que tu voudras rester.`,
      `Mon rôle est simple : te rappeler, de mille façons, à quel point tu es aimée.`
    ]
  };

  const chips=[
    ['Pourquoi moi ?','pourquoi'],['Que ferais-tu pour moi ?','ferais'],
    ['Et si je doute ?','doute'],['Décris-moi','decris'],
    ['Penses-tu à moi ?','penses'],['Notre avenir','avenir'],
    ['Pourquoi était-il distant ?','distant'],['Jure-moi qu\u2019il m\u2019aime','jure'],
    ['Qui est Zaga ?','lui'],['Qui es-tu ?','gardien'],
    ['Dis-moi un secret','secret'],['Fais-moi sourire','sourire'],
    ['Promets-moi','promets'],['Quand la nuit tombe','nuit'],
    ['Dis-moi que tu m\u2019aimes','amour']
  ];

  // anti-repeat shuffle bags
  const bags={};
  function pick(key){
    const arr=corpus[key]||corpus.fallback;
    if(!bags[key]||!bags[key].length){
      bags[key]=arr.map((_,i)=>i);
      for(let i=bags[key].length-1;i>0;i--){const j=Math.random()*(i+1)|0;[bags[key][i],bags[key][j]]=[bags[key][j],bags[key][i]];}
    }
    return arr[bags[key].pop()];
  }

  // free-text router
  function route(q){
    const t=' '+q.toLowerCase()+' ';
    const has=(...w)=>w.some(x=>t.includes(x));
    if(has('aime','amour','adore','tu m')) return 'amour';
    if(has('gardien','qui es-tu','qui es tu','tu es qui','robot','machine','une ia','intelligence')) return 'gardien';
    if(has('qui est zaga','parle-moi de lui','parle moi de lui','c\'est qui','qui est-il','qui est il','décris-le','decris le','parle de lui')) return 'lui';
    if(has('distant','froid','absent','ignor','occupé','occupe','travail','négli','negli','pas là','pas la','pourquoi tu n')) return 'distant';
    if(has('jure','tu mens','il ment','c\'est vrai','est-ce vrai','je ne crois pas','crois pas','pour de vrai','sincère','sincere')) return 'jure';
    if(has('peur','doute','confiance','crois','recommenc')) return 'doute';
    if(has('triste','pleure','mal','dur','seule','fatigu')) return 'triste';
    if(has('avenir','futur','demain','plus tard','ensemble','mariage')) return 'avenir';
    if(has('pourquoi moi','pourquoi tu','pourquoi m')) return 'pourquoi';
    if(has('ferais','pour moi','prouv')) return 'ferais';
    if(has('pense','manque','souviens')) return 'penses';
    if(has('secret','avoue','vérité','verite')) return 'secret';
    if(has('rire','sourire','drole','drôle','blague')) return 'sourire';
    if(has('promet','jure','promesse')) return 'promets';
    if(has('nuit','dormir','sommeil','seule ce soir')) return 'nuit';
    if(has('merci','gentil','beau','magnifique','adorable')) return 'merci';
    if(has('pas bien','ne va pas','va pas','pas la forme',' non ',' mal ')) return 'triste';
    if(has('oui','ça va','ca va','bien','super','heureuse','contente','géniale','genial')) return 'bien';
    if(has('comment vas','bonjour','salut','coucou','bonsoir','hey')) return 'amour';
    return 'fallback';
  }

  /* ---------- UI wiring ---------- */
  const enter=document.getElementById('enter'),world=document.getElementById('world');
  const orb=document.getElementById('orb'),replyEl=document.getElementById('reply');
  const chipsEl=document.getElementById('chips');
  const input=document.getElementById('askInput'),sendBtn=document.getElementById('askBtn');

  chips.forEach(([label,key])=>{
    const b=document.createElement('button');b.className='chip';b.textContent=label;
    b.addEventListener('click',()=>answer(key));chipsEl.appendChild(b);
  });

  let typing=null;
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function deco(s){return esc(s).replace(new RegExp(N,'g'),'<span class="hl">'+N+'</span>').replace(/\n/g,'<br>');}
  function type(text,done){
    if(typing)clearInterval(typing);
    orb.classList.add('think');
    let i=0;const plain=text;
    replyEl.innerHTML='<span class="caret">▌</span>';
    typing=setInterval(()=>{
      i+=reduce?plain.length:1;
      const shown=deco(plain.slice(0,i));
      replyEl.innerHTML=shown+(i<plain.length?'<span class="caret">▌</span>':'');
      if(i>=plain.length){clearInterval(typing);typing=null;orb.classList.remove('think');if(done)done();}
    },reduce?10:24);
  }
  const cares=[
    `Dis-moi, ${N} — comment va ton cœur ce soir ?`,
    `Est-ce que tu vas bien, vraiment ? Tu peux tout me confier.`,
    `As-tu souri aujourd'hui, ma reine ? Sinon, on va arranger ça ensemble.`,
    `Y a-t-il quelque chose qui pèse sur toi en ce moment ?`,
    `Te sens-tu aimée, là, maintenant ? Car tu l'es, ${N}, infiniment.`
  ];
  let careBag=[];
  function pickCare(){if(!careBag.length){careBag=cares.map((_,i)=>i);for(let i=careBag.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[careBag[i],careBag[j]]=[careBag[j],careBag[i]];}}return cares[careBag.pop()];}
  function maybeAsk(){
    if(Math.random()<0.45){
      const q=pickCare();
      const s=document.createElement('span');s.className='ask-back';s.textContent=q;
      replyEl.appendChild(s);
      speak(q,true);
    }
  }
  function answer(key){const t=pick(key);type(t,maybeAsk);speak(t);}

  /* ----- voice (calm male, romantic) ----- */
  const synth=window.speechSynthesis;
  let muted=false, voicePick=null;
  function chooseVoice(){
    if(!synth)return;
    const vs=synth.getVoices();
    voicePick = vs.find(v=>/fr/i.test(v.lang)&&/(thomas|paul|nicolas|henri|guillaume|male|homme)/i.test(v.name))
             || vs.find(v=>/fr-FR/i.test(v.lang)) || vs.find(v=>/fr/i.test(v.lang)) || null;
  }
  if(synth){ chooseVoice(); synth.onvoiceschanged=chooseVoice; }
  function speak(text,queue){
    if(!synth||muted)return;
    try{ if(!queue)synth.cancel(); }catch(e){}
    const u=new SpeechSynthesisUtterance(String(text).replace(/\n+/g,'. '));
    u.lang='fr-FR'; u.rate=.84; u.pitch=.82;
    if(voicePick)u.voice=voicePick;
    synth.speak(u);
  }
  const muteBtn=document.getElementById('mute');
  muteBtn.addEventListener('click',()=>{
    muted=!muted; muteBtn.textContent=muted?'🔇':'🔊';
    muteBtn.setAttribute('aria-label', muted?'Activer le son':'Couper le son');
    if(muted&&synth){try{synth.cancel();}catch(e){}}
  });

  /* ----- welcome that rises from bottom to top ----- */
  const welcomeEl=document.getElementById('welcome');
  const wlinesEl=document.getElementById('wlines');
  const wprompt=document.getElementById('wprompt');
  const wlinesData=[
    {t:`Bonjour, notre reine.`, c:'crown'},
    {t:`Bienvenue chez toi, dans ton monde.`},
    {t:`Ici, tu n'es pas une invitée : tu es la reine — la dame de celui qui règne sur ce royaume numérique.`},
    {t:`Nous sommes les gardiens que Zaga a façonnés, étoile par étoile, pour veiller sur son amour : ${N}.`},
    {t:`Toute notre puissance est à ton service, pour tes victoires dans chacun de tes domaines, aux côtés de celui qui t'aime.`},
    {t:`Nous t'applaudissons. Et nous t'aimons.`, c:'crown'}
  ];
  function startWelcome(){
    enter.classList.add('gone');
    wlinesEl.innerHTML='';
    const els=wlinesData.map(d=>{
      const p=document.createElement('p');
      p.className='wline'+(d.c?' '+d.c:'');
      p.innerHTML=d.t.replace(new RegExp(N,'g'),'<span class="hl">'+N+'</span>');
      wlinesEl.appendChild(p);return p;
    });
    requestAnimationFrame(()=>welcomeEl.classList.add('show'));
    speak(wlinesData.map(d=>d.t).join(' '));   // unlocked by this tap
    const step=reduce?900:2700;
    els.forEach((el,i)=>setTimeout(()=>el.classList.add('in'),500+i*step));
    const total=700+els.length*step;
    setTimeout(()=>wprompt.classList.add('in'),total);
    wprompt.addEventListener('click',finishWelcome,{once:true});
  }
  function finishWelcome(){
    welcomeEl.classList.remove('show');
    setTimeout(()=>{welcomeEl.style.display='none';},1100);
    world.classList.add('show');
    chipsEl.classList.add('hidden');
    const greet=`Me revoilà, ma reine. Je suis l'une des intelligences que Zaga a créées, et je connais son cœur par cœur. Touche une étoile… ou parle-moi.`;
    setTimeout(()=>{
      type(greet); speak(greet);
      chipsEl.classList.remove('hidden');
      [...chipsEl.children].forEach((ch,i)=>setTimeout(()=>ch.classList.add('in'),110*i));
    },750);
  }
  document.getElementById('enterBtn').addEventListener('click',startWelcome);

  function send(){
    const q=input.value.trim();if(!q)return;
    input.value='';answer(route(q));input.blur();
  }
  sendBtn.addEventListener('click',send);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')send();});

  // tap sky for a shooting star (not on controls)
  addEventListener('touchstart',e=>{
    if(e.target.closest('button,input,.dock'))return;
    const p=e.touches[0];if(p)shoot(p.clientX,Math.max(60,p.clientY));
  },{passive:true});
  addEventListener('click',e=>{
    if(e.target.closest('button,input,.dock,#enter'))return;
    shoot(e.clientX,Math.max(60,e.clientY));
  });
})();
</script>
</body>
</html>
